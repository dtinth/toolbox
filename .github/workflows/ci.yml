name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Format + lint (zero warnings) + typecheck.
      - name: Check
        run: pnpm exec vp check

      - name: Test
        run: pnpm exec vp test --run

      # Full build: lint gate + tsc + tool bundles + Vite client into ./dist.
      - name: Build
        run: pnpm build

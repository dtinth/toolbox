name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The test runner is driven by a global vite-plus (as in local dev); the
      # project-pinned copy's `vp test` can't resolve the aliased vitest bin
      # under pnpm's strict node_modules.
      - name: Install vite-plus (global)
        run: npm i -g vite-plus

      # Format + lint (zero warnings) + typecheck.
      - name: Check
        run: vp check

      - name: Test
        run: vp test --run

      # Full build: lint gate + tsc + tool bundles + Vite client into ./dist.
      - name: Build
        run: pnpm build

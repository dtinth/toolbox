name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Installs the vp (Vite+) CLI + Node and runs `vp install` (run-install
      # defaults to true), so no separate pnpm/corepack/setup-node steps.
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      # Format + lint (zero warnings) + typecheck.
      - name: Check
        run: vp check

      - name: Test
        run: vp test --run

      # Full build: prebuild lint gate + tsc + tool bundles + Vite client.
      - name: Build
        run: vp run build

name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Format + lint (zero warnings) + typecheck.
      - name: Check
        run: pnpm exec vp check

      # Full build: lint gate + tsc + tool bundles + Vite client into ./dist.
      # This is the project's CI gate (see PLAN.md). The unit-test runner
      # (`vp test`) is run locally; it doesn't resolve under pnpm's strict
      # node_modules in CI (vite-plus-core / vite-plus-test version skew).
      - name: Build
        run: pnpm build
